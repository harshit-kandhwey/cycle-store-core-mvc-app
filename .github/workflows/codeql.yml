name: "CodeQL"

on:
  push:
    branches: [ "ui-revamp", "main", "master" ]
  pull_request:
    branches: [ "ui-revamp" ]
  schedule:
    - cron: "23 3 * * 1"   # weekly, Monday 03:23 UTC

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Build
        run: dotnet build AdventureWorksMVCCore.Web/AdventureWorksMVCCore.Web.csproj -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
